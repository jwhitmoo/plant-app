<style>

.fwrap{padding:16px;display:flex;flex-direction:column;gap:14px}
.ffield label{display:block;font-size:12px;color:var(--mu);margin-bottom:4px;font-weight:500}
.ffield input,.ffield textarea{width:100%;padding:11px 14px;border:1px solid var(--bd);border-radius:10px;font-size:16px;font-family:inherit;background:#fff;color:var(--tx);outline:none;-webkit-appearance:none;resize:none}
.ffield input:focus,.ffield textarea:focus{border-color:var(--g)}
.ffield .hint{font-size:12px;color:var(--mu);margin-top:4px;line-height:1.4}
.fgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fbtns{display:flex;gap:10px}
.bp{flex:1;padding:14px;border-radius:12px;border:none;background:var(--g);color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.bp:active{opacity:.8}
.bs{flex:1;padding:14px;border-radius:12px;border:1px solid var(--bd);background:#fff;color:var(--tx);font-size:16px;cursor:pointer;font-family:inherit}
.id-photo{width:100%;max-height:260px;object-fit:cover;border-radius:12px}
.id-result{margin:0 16px 12px;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;font-size:14px;line-height:1.7;white-space:pre-wrap}
.id-add-btn{margin:0 16px 16px;padding:14px;border-radius:12px;border:none;background:var(--g);color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;width:calc(100% - 32px)}
.spinner{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.spin-row{padding:14px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mu)}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.overlay img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:6px}
.overlay-close{color:#fff;font-size:13px;margin-top:16px;opacity:.7}
.key-card{margin:16px;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:18px}
.key-card h3{font-size:15px;font-weight:600;margin-bottom:8px}
.key-card p{font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:14px}
.key-card a{color:var(--g);text-decoration:none}
.key-set{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--g);padding:10px 0 0}
</style>

<script>
const NOW=new Date().toISOString();
const INIT=[
  {id:'1',name:'Monkey Mask Monstera',species:'Monstera adansonii',location:'East bedroom window',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:548,lastWatered:NOW,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},

  {id:'3',name:'Oxalis (1)',species:'Oxalis triangularis',location:'North window',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'4',name:'Oxalis (2)',species:'Oxalis triangularis',location:'North window',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'5',name:'Asparagus Fern',species:'Asparagus setaceus',location:'Shelf behind sofa',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'6',name:'Palm',species:'Unknown palm',location:'East window',waterFreqDays:10,fertiliseFreqDays:30,repotFreqDays:365,lastWatered:NOW,lastFertilised:null,lastRepotted:NOW,notes:[],photos:[],chatHistory:[]},
  {id:'7',name:'Pink Princess Philodendron',species:'Philodendron erubescens',location:'East window',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'8',name:'Coffee Plant',species:'Coffea arabica',location:'Shelf, grow light',waterFreqDays:7,fertiliseFreqDays:14,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'9',name:'String of Turtles',species:'Peperomia prostrata',location:'Drawer unit',waterFreqDays:14,fertiliseFreqDays:30,repotFreqDays:548,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'10',name:'Peperomia',species:'Peperomia obtusifolia var.',location:'Shelf',waterFreqDays:14,fertiliseFreqDays:30,repotFreqDays:548,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'11',name:'Schefflera',species:'Schefflera arboricola',location:'North window',waterFreqDays:10,fertiliseFreqDays:14,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:NOW,notes:[],photos:[],chatHistory:[]},
  {id:'12',name:'Basil',species:'Ocimum basilicum',location:'East kitchen window',waterFreqDays:3,fertiliseFreqDays:14,repotFreqDays:180,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'13',name:'Cactus',species:'Unknown',location:'Shelf, grow light',waterFreqDays:14,fertiliseFreqDays:60,repotFreqDays:730,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
  {id:'14',name:'Tradescantia',species:'Tradescantia zebrina',location:'North window',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365,lastWatered:null,lastFertilised:null,lastRepotted:null,notes:[],photos:[],chatHistory:[]},
];

function ls(k,def){try{const s=localStorage.getItem(k);return s!=null?JSON.parse(s):def}catch{return def}}
function lss(k,def){try{const s=localStorage.getItem(k);return s!=null?s:def}catch{return def}}

let plants=ls('fp',null);
if(!plants){plants=INIT}else{plants=plants.map(p=>({...p,photos:ls('fp-ph-'+p.id,[]),chatHistory:ls('fp-ch-'+p.id,[])}))}
let gMsgs=ls('fm',[{role:'assistant',content:'Hi! I know your whole plant collection. Ask me anything about care, watering schedules, or troubleshooting.'}]);
let apiKey=lss('foliage-key','');
let keyInput=apiKey;
let view='list',tab='plants',selId=null;
let gChatIn='',gLoading=false,noteIn='',pChatIn='',pLoading=false;
let formData={name:'',species:'',location:'',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365};
let photoSrc=null,identData=null,pendingId=null;

function saveAll(){
  const slim=plants.map(({photos,chatHistory,...p})=>p);
  try{localStorage.setItem('fp',JSON.stringify(slim))}catch{}
  plants.forEach(p=>{
    if((p.photos||[]).length)try{localStorage.setItem('fp-ph-'+p.id,JSON.stringify(p.photos))}catch{}
    if((p.chatHistory||[]).length)try{localStorage.setItem('fp-ch-'+p.id,JSON.stringify(p.chatHistory))}catch{}
  });
  try{localStorage.setItem('fm',JSON.stringify(gMsgs))}catch{}
}

function fmt(iso){if(!iso)return'—';const d=Math.floor((Date.now()-new Date(iso))/86400000);if(d===0)return'today';if(d===1)return'yesterday';if(d<7)return d+'d ago';return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function due(last,freq){if(!last)return null;return Math.round(freq-(Date.now()-new Date(last))/86400000)}
function sclr(d){if(d===null)return'#bbb';if(d<=0)return'#dc3545';if(d<=2)return'#fd7e14';return'#3B6D11'}
function flbl(d){return d<30?d+'d':Math.round(d/30)+'mo'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function resizeImg(file){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=700,ratio=Math.min(MAX/img.width,MAX/img.height,1);
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.72));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);res(null)};
    img.src=url;
  });
}

async function callApi(messages,system,maxTok=800){
  if(!apiKey)throw new Error('NO_KEY');
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system,messages})
  });
  const d=await resp.json();
  if(d.error)throw new Error(d.error.message||'API error');
  return d.content?d.content.filter(b=>b.type==='text').map(b=>b.text).join(''):'No response.';
}

function imgMsg(dataUrl,text){
  const base64=dataUrl.split(',')[1];
  const mt=dataUrl.split(';')[0].split(':')[1]||'image/jpeg';
  return{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:base64}},{type:'text',text}]};
}

function plantCtx(p){
  const anas=(p.photos||[]).filter(ph=>ph.analysis).slice(-2).map(ph=>ph.analysis).join('; ');
  return`Plant: ${p.name} (${p.species})\nLocation: ${p.location}\nWater every ${p.waterFreqDays}d, last: ${fmt(p.lastWatered)}\nFertilise every ${p.fertiliseFreqDays}d, last: ${fmt(p.lastFertilised)}\nRepot every ${flbl(p.repotFreqDays)}, last: ${fmt(p.lastRepotted)}\nNotes: ${(p.notes||[]).slice(-3).map(n=>n.text).join('; ')||'none'}\nRecent photo analyses: ${anas||'none'}`;
}

// File input handlers
document.getElementById('hero-inp').addEventListener('change',async function(){
  if(!this.files[0]||!pendingId)return;
  const dataUrl=await resizeImg(this.files[0]);
  if(!dataUrl)return;
  const pid=''+Date.now();
  plants=plants.map(p=>p.id===pendingId?{...p,photos:[...(p.photos||[]),{id:pid,date:new Date().toISOString(),dataUrl,analysis:null,analyzing:true}]}:p);
  saveAll();render();
  runPhotoAnalysis(pendingId,pid);
  this.value='';
});
document.getElementById('photo-inp').addEventListener('change',async function(){
  if(!this.files[0]||!pendingId)return;
  const dataUrl=await resizeImg(this.files[0]);
  if(!dataUrl)return;
  const pid=''+Date.now();
  plants=plants.map(p=>p.id===pendingId?{...p,photos:[...(p.photos||[]),{id:pid,date:new Date().toISOString(),dataUrl,analysis:null,analyzing:true}]}:p);
  saveAll();render();
  runPhotoAnalysis(pendingId,pid);
  this.value='';
});
document.getElementById('id-inp').addEventListener('change',async function(){
  if(!this.files[0])return;
  const dataUrl=await resizeImg(this.files[0]);
  if(!dataUrl)return;
  identData={dataUrl,analyzing:true,result:null};
  view='identify';render();
  try{
    const result=await callApi([imgMsg(dataUrl,'Identify this plant. Give: 1) Common name 2) Scientific name 3) Brief care needs (light, water, humidity) 4) Any visible health issues in this photo. Be concise and practical.')],'You are a plant identification expert.',600);
    identData={...identData,analyzing:false,result};
  }catch(e){
    identData={...identData,analyzing:false,result:e.message==='NO_KEY'?'⚠️ No API key set. Go to Settings to add your key.':'Identification failed: '+e.message};
  }
  render();this.value='';
});

async function runPhotoAnalysis(plantId,photoId){
  const plant=plants.find(p=>p.id===plantId);
  const photo=(plant?.photos||[]).find(ph=>ph.id===photoId);
  if(!photo||!photo.dataUrl)return;
  try{
    const analysis=await callApi([imgMsg(photo.dataUrl,`This is my ${plant.name} (${plant.species}). Analyze for health issues, pests, stress signs, or anything notable. 2-3 sentences max. If healthy, say so briefly.`)],'You are a plant health expert. Be concise.',400);
    plants=plants.map(p=>p.id===plantId?{...p,photos:(p.photos||[]).map(ph=>ph.id===photoId?{...ph,analysis,analyzing:false}:ph)}:p);
  }catch(e){
    const msg=e.message==='NO_KEY'?'No API key — go to Settings.':'Analysis failed: '+e.message;
    plants=plants.map(p=>p.id===plantId?{...p,photos:(p.photos||[]).map(ph=>ph.id===photoId?{...ph,analysis:msg,analyzing:false}:ph)}:p);
  }
  saveAll();render();
}

function trigCam(plantId,inputId){pendingId=plantId;document.getElementById(inputId).click()}
function trigId(){document.getElementById('id-inp').click()}
function viewFull(src){photoSrc=src;render()}
function closeOverlay(){photoSrc=null;render()}

function switchTab(t){tab=t;if(t==='plants')view='list';render()}
function openPlant(id){selId=id;view='detail';noteIn='';pChatIn='';render();setTimeout(()=>{const el=document.getElementById('pc-msgs');if(el)el.scrollTop=el.scrollHeight},80)}
function goBack(){view='list';selId=null;identData=null;render()}
function markDone(id,key){plants=plants.map(p=>p.id===id?{...p,[key]:new Date().toISOString()}:p);saveAll();render()}

function addNote(id){
  const el=document.getElementById('ni');const txt=(el?el.value:noteIn).trim();if(!txt)return;
  plants=plants.map(p=>p.id===id?{...p,notes:[...(p.notes||[]),{id:''+Date.now(),text:txt,date:new Date().toISOString()}]}:p);
  noteIn='';saveAll();render();
}
function delPhoto(plantId,photoId){
  plants=plants.map(p=>p.id===plantId?{...p,photos:(p.photos||[]).filter(ph=>ph.id!==photoId)}:p);
  saveAll();render();
}
function delPlant(id){
  if(!confirm('Delete this plant?'))return;
  plants=plants.filter(p=>p.id!==id);selId=null;view='list';saveAll();render();
}
function doAddPlant(){
  if(!formData.name.trim()){alert('Please enter a plant name');return}
  plants=[...plants,{...formData,id:''+Date.now(),notes:[],photos:[],chatHistory:[],lastWatered:null,lastFertilised:null,lastRepotted:null}];
  view='list';saveAll();render();
}

async function sendPChat(plantId){
  const el=document.getElementById('pci');const txt=(el?el.value:pChatIn).trim();
  if(!txt||pLoading)return;
  const plant=plants.find(p=>p.id===plantId);if(!plant)return;
  const hist=plant.chatHistory||[];const next=[...hist,{role:'user',content:txt}];
  plants=plants.map(p=>p.id===plantId?{...p,chatHistory:next,chatLoading:true}:p);
  pChatIn='';saveAll();render();
  setTimeout(()=>{const el=document.getElementById('pc-msgs');if(el)el.scrollTop=el.scrollHeight},50);
  try{
    const fu=next.findIndex(m=>m.role==='user');const api=fu>=0?next.slice(fu):next;
    const reply=await callApi(api.map(m=>({role:m.role,content:m.content})),`You are a plant care expert helping with:\n${plantCtx(plant)}\nBe concise and specific.`);
    plants=plants.map(p=>p.id===plantId?{...p,chatHistory:[...next,{role:'assistant',content:reply}],chatLoading:false}:p);
  }catch(e){
    const msg=e.message==='NO_KEY'?'No API key set — go to Settings.':'Error: '+e.message;
    plants=plants.map(p=>p.id===plantId?{...p,chatHistory:[...next,{role:'assistant',content:msg}],chatLoading:false}:p);
  }
  saveAll();render();
  setTimeout(()=>{const el=document.getElementById('pc-msgs');if(el)el.scrollTop=el.scrollHeight},50);
}

async function sendGChat(){
  const el=document.getElementById('gci');const txt=(el?el.value:gChatIn).trim();
  if(!txt||gLoading)return;
  gMsgs=[...gMsgs,{role:'user',content:txt}];gChatIn='';gLoading=true;render();
  setTimeout(()=>{const el=document.getElementById('gc-msgs');if(el)el.scrollTop=el.scrollHeight},50);
  const ctx=plants.map(p=>`${p.name} (${p.species}), ${p.location}. Water every ${p.waterFreqDays}d (last: ${fmt(p.lastWatered)}), fertilise every ${p.fertiliseFreqDays}d.`).join('\n');
  const fu=gMsgs.findIndex(m=>m.role==='user');const api=fu>=0?gMsgs.slice(fu):gMsgs;
  try{
    const reply=await callApi(api.map(m=>({role:m.role,content:m.content})),`You are a plant care assistant. User's plants:\n${ctx}\nBe concise, warm, specific.`);
    gMsgs=[...gMsgs,{role:'assistant',content:reply}];
  }catch(e){
    gMsgs=[...gMsgs,{role:'assistant',content:e.message==='NO_KEY'?'No API key set — go to Settings.':'Error: '+e.message}];
  }
  gLoading=false;saveAll();render();
  setTimeout(()=>{const el=document.getElementById('gc-msgs');if(el)el.scrollTop=el.scrollHeight},50);
}

function saveKey(){
  const el=document.getElementById('key-field');
  const val=(el?el.value:keyInput).trim();
  if(!val){alert('Please paste your API key');return}
  apiKey=val;localStorage.setItem('foliage-key',val);
  alert('API key saved! All features are now unlocked.');
  view='list';render();
}

function prefill(){
  if(!identData?.result)return;
  const lines=identData.result.split('\n');
  const nl=lines.find(l=>/common|1[)\.]/i.test(l))||lines[0]||'';
  const sl=lines.find(l=>/scientific|2[)\.]/i.test(l))||'';
  formData={
    name:nl.replace(/^[0-9\.\)\s:*#]+/,'').replace(/common\s*name[:\s]*/i,'').trim()||'New plant',
    species:sl.replace(/^[0-9\.\)\s:*#]+/,'').replace(/scientific\s*name[:\s]*/i,'').trim()||'',
    location:'',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365
  };
  identData=null;view='add';render();
}

function render(){
  const sel=plants.find(p=>p.id===selId);
  let hdr='',body='';

  if(tab==='plants'){
    if(view==='list'){
      hdr=`<span class="logo">foliage</span><div style="flex:1"></div>
        <button class="hico" onclick="trigId()" title="Identify plant">🔍</button>
        <button class="hico" onclick="view='settings';render()" title="Settings">⚙️</button>
        <button class="hbtn" onclick="view='add';formData={name:'',species:'',location:'',waterFreqDays:7,fertiliseFreqDays:30,repotFreqDays:365};render()">+ add</button>`;
      const noKey=!apiKey;
      body=`
        ${noKey?`<div class="banner"><div>⚠️ <strong>API key needed</strong> for chat, photo analysis &amp; plant ID.<button class="banner-btn" onclick="view='settings';render()">Set up in Settings →</button></div></div>`:''}
        <div class="legend">${[['#3B6D11','ok'],['#fd7e14','soon'],['#dc3545','overdue'],['#bbb','not set']].map(([c,l])=>`<div class="legend-item"><div class="dot" style="background:${c}"></div>${l}</div>`).join('')}</div>
        <div class="plist">
          ${plants.map(p=>{
            const w=due(p.lastWatered,p.waterFreqDays),f=due(p.lastFertilised,p.fertiliseFreqDays),r=due(p.lastRepotted,p.repotFreqDays);
            const recent=(p.photos||[]).slice(-1)[0];
            return`<div class="pcard" onclick="openPlant('${p.id}')">
              <div class="pthumb">${recent?.dataUrl?`<img src="${recent.dataUrl}" alt="">`:'🌿'}</div>
              <div class="pinfo">
                <div class="pname">${esc(p.name)}</div>
                <div class="psp">${esc(p.species)}</div>
                <div class="dots">
                  <div class="dot" style="background:${sclr(w)}"></div>
                  <div class="dot" style="background:${sclr(f)}"></div>
                  <div class="dot" style="background:${sclr(r)}"></div>
                </div>
              </div>
              <span class="chev">›</span>
            </div>`;
          }).join('')}
        </div>`;

    } else if(view==='settings'){
      hdr=`<button class="back" onclick="goBack()">‹ Plants</button><span class="htitle">Settings</span>`;
      body=`<div class="key-card">
        <h3>Anthropic API key</h3>
        <p>Required for chat, photo health analysis, and plant identification. Your key is stored only in this browser — it's never shared or uploaded anywhere.</p>
        <p>Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys.</p>
        <div class="ffield" style="margin-bottom:12px">
          <label>API key</label>
          <input id="key-field" type="password" placeholder="sk-ant-api03-..." value="${esc(apiKey)}" oninput="keyInput=this.value" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <button class="bp" onclick="saveKey()">Save key</button>
        ${apiKey?`<div class="key-set">✓ Key is set — all features active</div>`:''}
      </div>
      <div class="key-card" style="margin-top:0">
        <h3>About</h3>
        <p>foliage tracks your 14 plants, logs watering/fertilising/repotting, analyses health from photos, and identifies unknown plants using Claude AI.</p>
      </div>`;

    } else if(view==='detail'&&sel){
      const recent=(sel.photos||[]).slice(-1)[0];
      const rows=[
        {dk:'lastWatered',last:sel.lastWatered,freq:sel.waterFreqDays,lbl:'💧 Water'},
        {dk:'lastFertilised',last:sel.lastFertilised,freq:sel.fertiliseFreqDays,lbl:'🌱 Fertilise'},
        {dk:'lastRepotted',last:sel.lastRepotted,freq:sel.repotFreqDays,lbl:'📦 Repot'},
      ];
      const hist=sel.chatHistory||[];
      hdr=`<button class="back" onclick="goBack()">‹ Plants</button><span class="htitle">${esc(sel.name)}</span>`;
      body=`
        <div class="hero" onclick="if('${recent?.dataUrl||''}')viewFull('${recent?.dataUrl||''}')">
          ${recent?.dataUrl?`<img src="${recent.dataUrl}" alt=""><div class="hero-tap">tap to expand</div>`:`<div class="hero-ph">🌿</div>`}
          <button class="hero-cam" onclick="event.stopPropagation();trigCam('${sel.id}','hero-inp')">📷 ${recent?'Update':'Add photo'}</button>
        </div>
        <div class="ltag">📍 ${esc(sel.location||'no location')}</div>

        <div class="dsec">
          <div class="dsec-hd">Care schedule</div>
          ${rows.map(({dk,last,freq,lbl})=>{const d=due(last,freq);return`<div class="crow"><span class="clbl">${lbl}</span><div class="cinfo"><span class="cfreq">every ${flbl(freq)}</span><span class="cst" style="color:${sclr(d)}">${last?fmt(last):'never done'}</span></div><button class="dbtn" onclick="markDone('${sel.id}','${dk}')">done</button></div>`}).join('')}
        </div>

        <div class="dsec">
          <div class="dsec-hd">Notes</div>
          ${(sel.notes||[]).length===0?'<div style="padding:14px 16px;font-size:14px;color:#bbb;font-style:italic">no notes yet</div>':''}
          ${(sel.notes||[]).map(n=>`<div class="nitem"><span class="ntxt">${esc(n.text)}</span><span class="ndate">${fmt(n.date)}</span></div>`).join('')}
          <div class="nadd"><input id="ni" type="text" placeholder="add a note..." value="${esc(noteIn)}" oninput="noteIn=this.value" onkeydown="if(event.key==='Enter')addNote('${sel.id}')"><button class="nadd-btn" onclick="addNote('${sel.id}')">add</button></div>
        </div>

        <div class="dsec">
          <div class="dsec-hd"><span>Photo health log</span><button class="dbtn-sm" onclick="trigCam('${sel.id}','photo-inp')">📷 add</button></div>
          ${(sel.photos||[]).length===0?'<div style="padding:14px 16px;font-size:14px;color:#bbb;font-style:italic">add a photo to start tracking health over time</div>':''}
          <div class="pgrid">
            ${[...(sel.photos||[])].reverse().map(ph=>`
              <div class="pphoto">
                <img src="${ph.dataUrl||''}" alt="" onclick="viewFull('${ph.dataUrl||''}')">
                <button class="pphoto-del" onclick="event.stopPropagation();delPhoto('${sel.id}','${ph.id}')">×</button>
                <div class="pphoto-info">
                  <div class="pphoto-date">${fmt(ph.date)}</div>
                  ${ph.analyzing?`<div class="pphoto-ana" style="color:#aaa"><span class="spinner"></span> analysing...</div>`:ph.analysis?`<div class="pphoto-ana">${esc(ph.analysis)}</div>`:''}
                </div>
              </div>`).join('')}
          </div>
        </div>

        <div class="dsec">
          <div class="dsec-hd">Ask about this plant</div>
          ${hist.length===0?`<div style="padding:12px 16px;font-size:13px;color:#bbb;font-style:italic">Chat specific to ${esc(sel.name)}...</div>`:''}
          <div class="pchat-msgs" id="pc-msgs">
            ${hist.map(m=>`<div class="mb ${m.role==='user'?'mu-msg':'ma-msg'}">${esc(m.content)}</div>`).join('')}
            ${sel.chatLoading?'<div class="mb ma-msg" style="color:#aaa">typing...</div>':''}
          </div>
          <div class="cinput"><input id="pci" type="text" placeholder="ask about this plant..." value="${esc(pChatIn)}" oninput="pChatIn=this.value" onkeydown="if(event.key==='Enter')sendPChat('${sel.id}')"><button class="csend" onclick="sendPChat('${sel.id}')" ${sel.chatLoading?'disabled':''}>send</button></div>
        </div>

        <button class="delbtn" onclick="delPlant('${sel.id}')">Delete plant</button>`;

    } else if(view==='add'){
      hdr=`<button class="back" onclick="goBack()">‹ Plants</button><span class="htitle">Add plant</span>`;
      body=`<div class="fwrap">
        <div class="ffield"><label>Plant name *</label><input type="text" placeholder="e.g. Monstera" value="${esc(formData.name)}" oninput="formData.name=this.value"></div>
        <div class="ffield"><label>Species</label><input type="text" placeholder="e.g. Monstera deliciosa" value="${esc(formData.species)}" oninput="formData.species=this.value"></div>
        <div class="ffield"><label>Location</label><input type="text" placeholder="e.g. East window" value="${esc(formData.location)}" oninput="formData.location=this.value"></div>
        <div class="fgrid">
          <div class="ffield"><label>Water (days)</label><input type="number" inputmode="numeric" value="${formData.waterFreqDays}" oninput="formData.waterFreqDays=parseInt(this.value)||1"></div>
          <div class="ffield"><label>Fertilise (days)</label><input type="number" inputmode="numeric" value="${formData.fertiliseFreqDays}" oninput="formData.fertiliseFreqDays=parseInt(this.value)||1"></div>
          <div class="ffield"><label>Repot (days)</label><input type="number" inputmode="numeric" value="${formData.repotFreqDays}" oninput="formData.repotFreqDays=parseInt(this.value)||1"></div>
        </div>
        <div class="fbtns"><button class="bs" onclick="goBack()">Cancel</button><button class="bp" onclick="doAddPlant()">Save plant</button></div>
      </div>`;

    } else if(view==='identify'){
      hdr=`<button class="back" onclick="goBack()">‹ Plants</button><span class="htitle">Plant identifier</span>`;
      body=identData?`
        <div style="padding:16px 16px 8px"><img src="${identData.dataUrl}" class="id-photo" alt=""></div>
        ${identData.analyzing?`<div class="spin-row"><span class="spinner"></span> Identifying plant...</div>`:
          identData.result?`<div class="id-result">${esc(identData.result)}</div><button class="id-add-btn" onclick="prefill()">+ Add to my plants</button>`:''}
      `:'';
    }
  }

  else if(tab==='chat'){
    hdr=`<span class="logo">foliage</span><span style="font-size:13px;color:#888;margin-left:6px">general chat</span><div style="flex:1"></div><button class="hico" onclick="view='settings';tab='plants';render()" title="Settings">⚙️</button>`;
    body=`<div class="gchat-msgs" id="gc-msgs">
      ${gMsgs.map(m=>`<div class="mb ${m.role==='user'?'mu-msg':'ma-msg'}">${esc(m.content)}</div>`).join('')}
      ${gLoading?'<div class="mb ma-msg" style="color:#aaa">typing...</div>':''}
    </div>
    <div class="gchat-input">
      <input id="gci" type="text" placeholder="ask about your plants..." value="${esc(gChatIn)}" oninput="gChatIn=this.value" onkeydown="if(event.key==='Enter')sendGChat()">
      <button class="gchat-send" onclick="sendGChat()" ${gLoading?'disabled':''}>Send</button>
    </div>`;
  }

  const ov=photoSrc?`<div class="overlay" onclick="closeOverlay()"><img src="${photoSrc}" alt=""><div class="overlay-close">tap to close</div></div>`:'';

  document.getElementById('app').innerHTML=`<header>${hdr}</header><main id="mc">${body}</main>
    <nav>
      <button class="${tab==='plants'?'on':''}" onclick="switchTab('plants')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12m0 0C12 7 7 4 3 6m9 6c0-5 5-8 9-6"/></svg>Plants
      </button>
      <button class="${tab==='chat'?'on':''}" onclick="switchTab('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat
      </button>
    </nav>${ov}`;

  if(tab==='chat')setTimeout(()=>{const el=document.getElementById('gc-msgs');if(el)el.scrollTop=el.scrollHeight},50);
}

// PWA
try{const m={name:'foliage',short_name:'foliage',display:'standalone',background_color:'#fafaf8',theme_color:'#3B6D11',start_url:'.',icons:[{src:`data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#3B6D11"/><text x="50" y="72" font-size="54" text-anchor="middle" fill="white">🌿</text></svg>')}`,sizes:'any',type:'image/svg+xml'}]};document.getElementById('mfst').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}))}catch(e){}
if('serviceWorker' in navigator){try{const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>{if(e.request.url.includes('anthropic')||e.request.method!=='GET')return;e.respondWith(caches.open('fv3').then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok)c.put(e.request,res.clone());return res}))));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{})}catch(e){}}

render();
</script>
</body>
</html>
